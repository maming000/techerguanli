<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="教师信息管理系统 - 教师详情">
    <title>教师详情 - 教师信息管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><span class="icon">🎓</span> 教师管理</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon">📋</span> 教师列表
            </a>
            <a href="/upload" class="nav-item">
                <span class="nav-icon">📤</span> 数据导入
            </a>
            <a href="/stats" class="nav-item">
                <span class="nav-icon">📊</span> 统计分析
            </a>
        </nav>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title" id="teacher-name">教师详情</h1>
                <p class="text-muted" style="font-size: 13px; margin-top: 2px;" id="teacher-meta"></p>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="window.location.href='/'">← 返回列表</button>
                <button class="btn btn-primary" onclick="showEditModal()">✏️ 编辑</button>
                <button class="btn btn-danger" onclick="deleteTeacher()">🗑️ 删除</button>
            </div>
        </header>

        <div class="content-area">
            <!-- 基本信息 -->
            <div class="card mb-24">
                <div class="card-header"><h2>📋 基本信息</h2></div>
                <div class="card-body" id="detail-content">
                    <div class="loading"><div class="spinner"></div> 加载中...</div>
                </div>
            </div>

            <!-- 标签 -->
            <div class="card mb-24">
                <div class="card-header"><h2>🏷️ 标签</h2></div>
                <div class="card-body" id="tags-section">
                    <div class="loading"><div class="spinner"></div> 加载中...</div>
                </div>
            </div>

            <!-- 修改记录 -->
            <div class="card">
                <div class="card-header"><h2>📝 修改记录</h2></div>
                <div class="card-body" id="logs-section">
                    <div class="loading"><div class="spinner"></div> 加载中...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/detail.js"></script>
</body>
</html>
