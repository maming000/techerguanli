<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="教师信息管理系统 - 教师详情">
    <title>教师详情 - 教师信息管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="detail-medical-page">
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><span class="icon">🎓</span> 教师管理</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><span class="nav-icon">📋</span> 教师列表</a>
            <a href="/upload" class="nav-item"><span class="nav-icon">📤</span> 数据导入</a>
            <a href="/stats" class="nav-item"><span class="nav-icon">📊</span> 统计分析</a>
            <a href="/assessment/start" class="nav-item"><span class="nav-icon">🧠</span> 人格测评</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header detail-cyber-header">
            <div>
                <h1 class="page-title">教师信息管理系统 | 教师详情</h1>
                <p class="detail-cyber-subtitle" id="teacher-meta">李晓雅 | 教师详情页</p>
            </div>
            <div class="detail-cyber-header-right">
                <div class="detail-cyber-status-line">
                    <span id="detail-current-time">--:--:--</span>
                    <span class="detail-cyber-status">系统正常</span>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showEditModal()">编辑</button>
                    <button class="btn btn-outline" onclick="window.location.href='/'">返回</button>
                    <button class="btn btn-outline" onclick="changeCoverColor()">更多</button>
                </div>
            </div>
        </header>

        <div class="content-area detail-cyber-content">
            <div class="detail-cyber-grid">
                <aside class="detail-cyber-left">
                    <section class="card detail-cyber-panel detail-cyber-profile">
                        <div class="detail-cyber-profile-top" id="profile-hero">
                            <div class="detail-cyber-avatar-wrap" id="hero-avatar-slot"></div>
                            <h2 class="detail-cyber-name" id="teacher-name-text">教师详情</h2>
                        </div>
                        <div class="detail-cyber-panel-body">
                            <div id="left-overview-grid" class="detail-cyber-kv-list"></div>
                            <input id="avatar-input" type="file" accept=".png,.jpg,.jpeg,.webp" style="display:none;">
                            <button class="btn btn-outline btn-sm mt-16" onclick="document.getElementById('avatar-input').click()">上传头像</button>
                        </div>
                    </section>
                </aside>

                <section class="detail-cyber-center">
                    <section class="card detail-cyber-panel">
                        <div class="detail-cyber-panel-head">
                            <h3>基本信息</h3>
                            <button class="btn btn-outline btn-sm detail-collapse-btn" data-target="center-basic-grid">折叠</button>
                        </div>
                        <div class="detail-cyber-panel-body">
                            <div id="center-basic-grid" class="detail-cyber-form-grid"></div>
                        </div>
                    </section>
                </section>

                <aside class="detail-cyber-right">
                    <section class="card detail-cyber-panel">
                        <div class="detail-cyber-panel-head">
                            <h3>教育背景</h3>
                            <button class="btn btn-outline btn-sm detail-collapse-btn" data-target="right-education-grid">折叠</button>
                        </div>
                        <div class="detail-cyber-panel-body">
                            <div id="right-education-grid" class="detail-cyber-form-grid detail-cyber-two-col"></div>
                        </div>
                    </section>

                    <section class="card detail-cyber-panel">
                        <div class="detail-cyber-panel-head">
                            <h3>工作与人事信息</h3>
                            <button class="btn btn-outline btn-sm detail-collapse-btn" data-target="right-work-grid">折叠</button>
                        </div>
                        <div class="detail-cyber-panel-body">
                            <div id="right-work-grid" class="detail-cyber-form-grid detail-cyber-two-col"></div>
                        </div>
                    </section>

                    <section class="card detail-cyber-panel">
                        <div class="detail-cyber-panel-head">
                            <h3>附加信息</h3>
                            <button class="btn btn-outline btn-sm detail-collapse-btn" data-target="right-extra-content">折叠</button>
                        </div>
                        <div class="detail-cyber-panel-body">
                            <div id="right-extra-content"></div>
                        </div>
                    </section>

                    <section class="card detail-cyber-panel">
                        <div class="detail-cyber-panel-head">
                            <h3>修改记录</h3>
                            <button class="btn btn-outline btn-sm detail-collapse-btn" data-target="logs-section">折叠</button>
                        </div>
                        <div class="detail-cyber-panel-body" id="logs-section">
                            <div class="loading"><div class="spinner"></div> 加载中...</div>
                        </div>
                    </section>

                    <section class="card detail-cyber-panel" id="account-card" style="display:none;">
                        <div class="detail-cyber-panel-head">
                            <h3>账号管理</h3>
                            <button class="btn btn-outline btn-sm detail-collapse-btn" data-target="account-section">折叠</button>
                        </div>
                        <div class="detail-cyber-panel-body" id="account-section"></div>
                    </section>
                </aside>
            </div>
        </div>
    </main>
</div>

<script src="/js/teacher-schema.js?v=20260327_03"></script>
<script src="/js/app.js?v=20260326_01"></script>
    <script src="/js/detail.js?v=20260327_05"></script>
</body>
</html>
