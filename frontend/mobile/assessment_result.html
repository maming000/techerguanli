<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>人格测评-结果（移动端）</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body class="m-body">
<div class="m-shell">
    <header class="m-topbar">
        <h1>测评结果</h1>
        <button class="btn btn-outline btn-sm" onclick="window.location.href='/m/assessment/history'">历史</button>
    </header>
    <main class="m-content" id="assessment-result-wrap">
        <div class="card mb-16">
            <div class="card-header"><h2>结果雷达图</h2></div>
            <div class="card-body">
                <div id="assessment-radar" class="assessment-radar"></div>
                <p class="text-muted mt-8">测评时间：<span id="assessment-result-time">-</span></p>
            </div>
        </div>
        <div id="assessment-result-cards" class="assessment-score-grid"></div>
    </main>
    <nav class="m-tabbar">
        <a href="/m">列表</a>
        <a href="/m/stats">统计</a>
        <a href="/m/assessment/start" class="active">测评</a>
    </nav>
</div>
<script src="/js/mobile-common.js"></script>
<script src="/js/assessment/mobile-bridge.js"></script>
<script src="/js/assessment/common.js"></script>
<script src="/js/assessment/result.js"></script>
</body>
</html>
