<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>移动端登录</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="m-body">
<div class="m-shell" style="max-width:460px;margin:0 auto;">
    <div class="m-login-card card">
        <div class="card-header"><h2>📱 教师管理（移动端）</h2></div>
        <div class="card-body">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input class="form-control" id="m-username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input class="form-control" id="m-password" type="password" placeholder="请输入密码">
            </div>
            <button class="btn btn-primary" style="width:100%" onclick="mobileLogin()">登录</button>
            <p class="text-muted mt-16" style="font-size:12px;">默认管理员：admin / admin123</p>
        </div>
    </div>
</div>
<script src="/js/mobile-login.js"></script>
</body>
</html>
