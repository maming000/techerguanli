<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="教师信息管理系统 - 统计分析">
    <title>统计分析 - 教师信息管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><span class="icon">🎓</span> 教师管理</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item">
                <span class="nav-icon">📋</span> 教师列表
            </a>
            <a href="/upload" class="nav-item">
                <span class="nav-icon">📤</span> 数据导入
            </a>
            <a href="/stats" class="nav-item active">
                <span class="nav-icon">📊</span> 统计分析
            </a>
        </nav>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">统计分析</h1>
        </header>

        <div class="content-area">
            <!-- 总览卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">👥</div>
                    <div class="stat-info">
                        <h3 id="total-count">-</h3>
                        <p>教师总数</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">👨</div>
                    <div class="stat-info">
                        <h3 id="male-count">-</h3>
                        <p>男教师</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">👩</div>
                    <div class="stat-info">
                        <h3 id="female-count">-</h3>
                        <p>女教师</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red">📏</div>
                    <div class="stat-info">
                        <h3 id="avg-age">-</h3>
                        <p>平均年龄</p>
                    </div>
                </div>
            </div>

            <!-- 图表 -->
            <div class="chart-grid">
                <div class="chart-card">
                    <div class="card-header"><h2>👫 性别分布</h2></div>
                    <div class="card-body" style="height: 300px;">
                        <canvas id="gender-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="card-header"><h2>🎂 年龄分布</h2></div>
                    <div class="card-body" style="height: 300px;">
                        <canvas id="age-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="card-header"><h2>🎓 学历统计</h2></div>
                    <div class="card-body" style="height: 300px;">
                        <canvas id="education-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="card-header"><h2>🏛️ 政治面貌</h2></div>
                    <div class="card-body" style="height: 300px;">
                        <canvas id="political-chart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 标签统计 -->
            <div class="card mt-24">
                <div class="card-header"><h2>🏷️ 标签统计</h2></div>
                <div class="card-body" id="tag-stats">
                    <div class="loading"><div class="spinner"></div> 加载中...</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/stats.js"></script>
</body>
</html>
