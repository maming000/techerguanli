<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格测评 - 测评中</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/assessment/route-guard.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1><span class="icon">🎓</span> 教师管理</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item"><span class="nav-icon">📋</span> 教师列表</a>
            <a href="/upload" class="nav-item"><span class="nav-icon">📤</span> 数据导入</a>
            <a href="/stats" class="nav-item"><span class="nav-icon">📊</span> 统计分析</a>
            <a href="/assessment/start" class="nav-item active"><span class="nav-icon">🧠</span> 人格测评</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title">人格测评（进行中）</h1>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="window.location.href='/assessment/start'">返回说明</button>
            </div>
        </header>

        <div class="content-area" id="assessment-test-wrap">
            <div class="card">
                <div class="card-body">
                    <div class="flex items-center" style="justify-content: space-between;">
                        <span id="assessment-question-no" class="text-muted">Q1</span>
                        <span id="assessment-progress-label" class="text-muted">第 1 / 50 题</span>
                    </div>
                    <div class="progress-bar mt-8">
                        <div class="progress-fill" id="assessment-progress-fill" style="width:2%"></div>
                    </div>

                    <h2 id="assessment-question-text" class="assessment-question mt-24">加载中...</h2>

                    <div class="assessment-options mt-24">
                        <label><input type="radio" name="assessment-answer" value="1"> 1 - 非常不同意</label>
                        <label><input type="radio" name="assessment-answer" value="2"> 2 - 比较不同意</label>
                        <label><input type="radio" name="assessment-answer" value="3"> 3 - 一般</label>
                        <label><input type="radio" name="assessment-answer" value="4"> 4 - 比较同意</label>
                        <label><input type="radio" name="assessment-answer" value="5"> 5 - 非常同意</label>
                    </div>

                    <div class="assessment-actions mt-24">
                        <button id="btn-prev-question" class="btn btn-outline">上一题</button>
                        <button id="btn-next-question" class="btn btn-primary">下一题</button>
                    </div>

                    <div class="assessment-disclaimer mt-16">
                        This assessment is for reference only and not a clinical diagnosis.
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="/js/app.js"></script>
<script src="/js/assessment/common.js"></script>
<script src="/js/assessment/test.js"></script>
</body>
</html>
