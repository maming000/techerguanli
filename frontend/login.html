<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 教师信息管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout" style="grid-template-columns: 1fr;">
    <main class="main-content" style="max-width: 480px; margin: 0 auto;">
        <div class="card" style="margin-top: 80px;">
            <div class="card-header">
                <h2>🔐 登录系统</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-control" id="login-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-control" id="login-password" placeholder="请输入密码">
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="submitLogin()">登录</button>
                <div class="mt-12" style="text-align: right;">
                    <a href="javascript:void(0)" onclick="showForgotPassword()" class="text-muted" style="font-size: 12px;">忘记密码？</a>
                </div>
                <p class="text-muted" style="font-size: 12px; line-height: 1.7; color: #b45309;">
                    安全提醒：同一IP在3分钟内连续输错密码5次，将被限制登录4小时。
                </p>
            </div>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
